<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- === PWA METADATA === -->
    <title>KOPERASI KELUARGA RENCO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a472a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RENCO">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Sisanya style kamu tetap sama -->
    <style>
    /* === SELURUH STYLE KAMU (dari :root sampai akhir) === */
    :root {
      --forest: #1a472a;
      --forest-mid: #2d6a4f;
      --forest-light: #40916c;
      --gold: #f4a922;
      --gold-light: #ffd166;
      --cream: #fefae0;
      --cream-dark: #f5f0d8;
      --dark: #0d2016;
      --text: #1c3025;
      --text-soft: #4a7c59;
      --white: #ffffff;
      --danger: #e63946;
      --info: #4361ee;
      --card-shadow: 0 4px 24px rgba(26,71,42,0.13);
      --radius: 18px;
      --radius-sm: 10px;
      --transition: all 0.25s cubic-bezier(.4,0,.2,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--forest);
  color: var(--text);
  position: relative;
}

/* ========== SPLASH ========== */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(160deg, #0d2016 0%, #1a472a 50%, #2d6a4f 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.6s ease;
}
#splash .logo-wrap {
  width: 120px; height: 120px; border-radius: 32px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 56px; margin-bottom: 24px;
  box-shadow: 0 8px 48px rgba(244,169,34,0.4);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
#splash h1 {
  font-family: 'Playfair Display', serif;
  color: var(--gold); font-size: 26px; text-align: center; letter-spacing: 1px;
}
#splash p { color: rgba(255,255,255,0.6); margin-top: 8px; font-size: 14px; }
.splash-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 99px; margin-top: 40px; overflow: hidden; }
.splash-fill { height: 100%; background: var(--gold); border-radius: 99px; animation: load 2.2s ease forwards; }
@keyframes load { from{width:0} to{width:100%} }

/* ========== APP SHELL ========== */
#app {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  background: var(--cream);
  opacity: 0; transition: opacity 0.5s ease;
}
#app.visible { opacity: 1; }

/* ========== HEADER ========== */
.app-header {
  background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
  color: white; padding: 14px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; position: relative; z-index: 10;
  box-shadow: 0 2px 16px rgba(0,0,0,0.2);
}
.app-header .logo { display: flex; align-items: center; gap: 10px; }
.app-header .logo-icon {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.app-header .logo-text h2 {
  font-family: 'Playfair Display', serif;
  font-size: 14px; color: var(--gold); line-height: 1;
}
.app-header .logo-text span { font-size: 10px; color: rgba(255,255,255,0.6); }
.header-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,0.12); border: none; color: white;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.icon-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.2); }

/* ========== CONTENT ========== */
#content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; padding-bottom: 80px;
}

/* ═══════════════════════════════════════════
   BOTTOM NAV — iPhone Frosted Glass Premium
═══════════════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(24px) saturate(200%);
  -webkit-backdrop-filter: blur(24px) saturate(200%);
  border-top: 0.5px solid rgba(0,0,0,0.12);
  display: flex; z-index: 100;
  box-shadow: 0 -1px 0 rgba(0,0,0,0.05), 0 -4px 24px rgba(0,0,0,0.06);
  padding-bottom: env(safe-area-inset-bottom);
  padding-top: 4px;
}
.nav-item {
  flex: 1; padding: 6px 4px 6px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  border: none; background: none; transition: var(--transition);
  font-family: inherit; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.nav-item:active { opacity: 0.7; }
.nav-item .nav-icon { font-size: 22px; transition: var(--transition); display: flex; align-items: center; justify-content: center; color: #a0a0a8; width: 32px; height: 32px; }
.nav-item .nav-icon svg { width: 22px; height: 22px; }
.nav-item .nav-label { font-size: 9px; color: #b8b8bc; font-weight: 600; letter-spacing: 0.3px; transition: var(--transition); }
.nav-item.active .nav-icon { transform: translateY(-1px); color: var(--forest-mid); }
.nav-item.active .nav-label { color: var(--forest-mid); font-weight: 700; }
.nav-indicator {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 28px; height: 2.5px;
  background: var(--forest-mid); border-radius: 0 0 3px 3px;
  opacity: 0; transition: var(--transition);
}
.nav-item.active .nav-indicator { opacity: 1; }
/* Syariah gold override indicator */
.nav-item-renco.active .nav-indicator {
  background: linear-gradient(90deg, #c8a84b, #f5d77e, #c8a84b) !important;
  width: 40px;
  height: 3px;
  box-shadow: 0 0 8px rgba(212,170,40,0.6);
}

/* ========== PAGE SECTIONS ========== */
.page { display: none; }
.page.active { display: block; }

/* ========== CARDS ========== */
.card {
  background: white; border-radius: var(--radius);
  box-shadow: var(--card-shadow); margin: 12px 16px;
  overflow: hidden;
}
.card-header {
  padding: 16px 20px 12px; border-bottom: 1px solid rgba(0,0,0,0.05);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-weight: 700; font-size: 15px; color: var(--text); }
.card-body { padding: 16px 20px; }

/* ========== HERO STATS ========== */
.hero-banner {
  background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 60%, var(--forest-light) 100%);
  padding: 20px; margin: 12px 16px; border-radius: var(--radius);
  position: relative; overflow: hidden; color: white;
}
.hero-banner::before {
  content: '🌿'; position: absolute; right: -10px; top: -10px;
  font-size: 100px; opacity: 0.08;
}
.hero-banner h3 { font-size: 12px; opacity: 0.7; margin-bottom: 4px; font-weight: 500; }
.hero-banner .amount {
  font-family: 'Playfair Display', serif;
  font-size: 32px; font-weight: 700; color: var(--gold);
}
.hero-banner .sub { font-size: 11px; opacity: 0.6; margin-top: 4px; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 16px 12px; }
.stat-card {
  background: white; border-radius: var(--radius-sm);
  padding: 14px; box-shadow: var(--card-shadow); text-align: center;
}
.stat-card .stat-icon { font-size: 26px; margin-bottom: 6px; display: flex; align-items: center; justify-content: center; min-height: 34px; }
.stat-card .stat-val { font-size: 18px; font-weight: 700; color: var(--forest); }
.stat-card .stat-lbl { font-size: 10px; color: var(--text-soft); }

/* ========== SECTION TITLE ========== */
.section-title {
  font-size: 13px; font-weight: 700; color: var(--text-soft);
  padding: 12px 20px 6px; letter-spacing: 0.5px; text-transform: uppercase;
}

/* ========== MEMBER CARD ========== */
.member-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px; border-bottom: 1px solid rgba(0,0,0,0.04);
  cursor: pointer; transition: var(--transition);
}
.member-item:last-child { border-bottom: none; }
.member-item:active { background: var(--cream); }

/* Member list dengan hide/show */
.member-item-wrap {
  border-bottom: 1px solid rgba(0,0,0,0.06);
  background: white;
  overflow: hidden;
}
.member-item-wrap:last-child { border-bottom: none; }
.member-item-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; cursor: pointer;
  transition: var(--transition); user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.member-item-row:active { background: var(--cream); }
.avatar {
  width: 48px; height: 48px; border-radius: 14px;
  background: linear-gradient(135deg, var(--forest-mid), var(--forest-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0; color: white; font-weight: 700;
  overflow: hidden; position: relative;
}
.avatar.gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); }
.avatar img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 14px;
}
.avatar-upload-overlay {
  position: absolute; inset: 0; border-radius: 14px;
  background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s; cursor: pointer; font-size: 18px;
}
.avatar:hover .avatar-upload-overlay { opacity: 1; }
/* Detail header photo */
.detail-avatar {
  overflow: hidden; position: relative;
}
.detail-avatar img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
}
.detail-avatar-upload {
  position: absolute; bottom: 0; right: 0;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--gold); border: 2px solid white;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
.detail-avatar-upload:hover { transform: scale(1.1); }
.member-info { flex: 1; min-width: 0; }
.member-name { font-weight: 700; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.member-sub { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
.badge {
  padding: 4px 10px; border-radius: 99px; font-size: 10px; font-weight: 700;
  background: rgba(64,145,108,0.12); color: var(--forest-light);
}
.badge.danger { background: rgba(230,57,70,0.12); color: var(--danger); }
.badge.gold { background: rgba(244,169,34,0.15); color: #b07a00; }

/* ========== BUTTONS ========== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px 22px; border-radius: var(--radius-sm); border: none; cursor: pointer;
  font-family: inherit; font-size: 14px; font-weight: 700; transition: var(--transition);
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--forest-mid); color: white; }
.btn-primary:active { background: var(--forest); }
.btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--dark); }
.btn-outline { background: transparent; border: 2px solid var(--forest-mid); color: var(--forest-mid); }
.btn-danger { background: var(--danger); color: white; }
.btn-sm { padding: 8px 14px; font-size: 12px; }
.btn-block { width: 100%; }
.btn-row { display: flex; gap: 10px; padding: 0 20px 16px; }

/* ========== FAB ========== */
.fab {
  position: fixed; right: 20px; bottom: 90px; z-index: 200;
  width: 56px; height: 56px; border-radius: 18px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border: none; font-size: 28px; cursor: pointer;
  box-shadow: 0 6px 24px rgba(244,169,34,0.45);
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition); color: var(--dark);
}
.fab:active { transform: scale(0.9); }

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: white; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px;
  max-height: 92vh; overflow-y: auto; padding: 0 0 env(safe-area-inset-bottom);
  transform: translateY(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; background: #e0e0e0; border-radius: 99px; margin: 14px auto 6px; }
.modal-header { padding: 10px 20px 16px; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 18px; font-weight: 700; color: var(--text); }
.modal-close { font-size: 24px; border: none; background: none; cursor: pointer; color: #aaa; padding: 4px; }
.modal-body { padding: 0 20px 24px; }

/* ========== FORMS ========== */
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 700; color: var(--text-soft); margin-bottom: 6px; letter-spacing: 0.4px; text-transform: uppercase; }
.field input, .field select, .field textarea {
  width: 100%; padding: 13px 16px; border-radius: var(--radius-sm);
  border: 2px solid #e8e8e8; font-family: inherit; font-size: 14px; color: var(--text);
  background: var(--cream); outline: none; transition: var(--transition);
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--forest-mid); background: white; }
.field textarea { resize: vertical; min-height: 80px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ========== TABS ========== */
.tab-bar {
  display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-pill {
  padding: 8px 18px; border-radius: 99px; font-size: 12px; font-weight: 700;
  border: 2px solid #e0e0e0; background: white; color: var(--text-soft);
  cursor: pointer; white-space: nowrap; transition: var(--transition); flex-shrink: 0;
}
.tab-pill.active { background: var(--forest-mid); border-color: var(--forest-mid); color: white; }
.tab-pill.tab-pinjaman.active { background: #c0392b; border-color: #c0392b; color: white; }
.tab-pill.tab-pembiayaan-syariah.active { background: linear-gradient(135deg,#6b21a8,#7c3aed); border-color: #6b21a8; color: white; }
.tab-pill.tab-cicilan.active  { background: #2563eb; border-color: #2563eb; color: white; }
.tab-pill.tab-angsuran.active { background: #7b2d8b; border-color: #7b2d8b; color: white; }
.tab-pill.tab-pembayaran.active { background: linear-gradient(135deg,#2563eb,#7b2d8b); border-color: #2563eb; color: white; }
.pembayaran-subtab-bar { display:flex; gap:8px; padding:12px 16px 4px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.pembayaran-subtab { flex-shrink:0; padding:8px 18px; border-radius:99px; border:1.5px solid rgba(0,0,0,0.12); background:white; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.pembayaran-subtab.aktif-cicilan { background:#2563eb; border-color:#2563eb; color:white; }
.pembayaran-subtab.aktif-angsuran { background:#7b2d8b; border-color:#7b2d8b; color:white; }
.pembayaran-subtab.aktif-rencopay { background:linear-gradient(135deg,#1a472a,#2d6a4f); border-color:#1a472a; color:#e8c97e; }
.tab-pill.tab-phu.active      { background: #5b21b6; border-color: #5b21b6; color: white; }
.tab-pill.tab-shu.active      { background: #b45309; border-color: #b45309; color: white; }
.tab-pill.tab-aset.active     { background: #0e7490; border-color: #0e7490; color: white; }

/* ========== RINCIAN AKAD COLLAPSIBLE ========== */
.rincian-akad-wrapper {
  overflow: hidden;
  transition: max-height 0.55s cubic-bezier(0.4,0,0.2,1), opacity 0.45s ease, transform 0.45s cubic-bezier(0.4,0,0.2,1);
  max-height: 0;
  opacity: 0;
  transform: translateY(-10px);
}
.rincian-akad-wrapper.open {
  max-height: 600px;
  opacity: 1;
  transform: translateY(0);
}
.rincian-akad-wrapper > * {
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s ease;
  opacity: 0;
  transform: translateY(-8px) scale(0.97);
}
.rincian-akad-wrapper.open > * {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.rincian-akad-wrapper.open > *:nth-child(1) { transition-delay: 0.05s; }
.rincian-akad-wrapper.open > *:nth-child(2) { transition-delay: 0.12s; }
.rincian-akad-wrapper.open > *:nth-child(3) { transition-delay: 0.19s; }
.rincian-akad-wrapper.open > *:nth-child(4) { transition-delay: 0.26s; }

/* Toggle button */
.toggle-rincian-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 8px 12px 10px; border: none; background: none;
  cursor: pointer; font-family: inherit;
  border-bottom: 1px dashed rgba(0,0,0,0.07);
  margin-bottom: 8px;
}
.toggle-rincian-btn .trb-label {
  font-size: 11px; font-weight: 800; letter-spacing: 0.4px;
  text-transform: uppercase; display: flex; align-items: center; gap: 5px;
}
.toggle-rincian-btn .trb-chevron {
  font-size: 14px; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; align-items: center;
}
.toggle-rincian-btn.open .trb-chevron { transform: rotate(180deg); }
#trb_chev_pendapatan, #trb_chev_pinjam, #trb_chev_editpin {
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; align-items: center;
}

/* Ripple effect on toggle */
@keyframes rincianReveal {
  0% { clip-path: inset(0 0 100% 0); opacity:0; }
  100% { clip-path: inset(0 0 0% 0); opacity:1; }
}
.rincian-akad-wrapper.animating-in {
  animation: none;
}
/* Shine effect when open */
@keyframes shimmerPurple {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
.toggle-rincian-btn .trb-label.shimmer-anim {
  background: linear-gradient(90deg, #6b21a8 0%, #a855f7 40%, #6b21a8 80%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmerPurple 1.5s ease 1;
}

/* ========== TRANSACTION LIST (ENHANCED) ========== */
.txn-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 14px; border-bottom: 1px solid rgba(0,0,0,0.04);
}
.txn-item:last-child { border-bottom: none; }
.txn-icon {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0;
}
.txn-icon.green { background: rgba(64,145,108,0.12); }
.txn-icon.red { background: rgba(230,57,70,0.12); }
.txn-icon.blue { background: rgba(67,97,238,0.12); }
.txn-icon.gold { background: rgba(244,169,34,0.12); }
.txn-info { flex: 1; min-width: 0; }
.txn-name { font-size: 11.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.txn-date { font-size: 10px; color: var(--text-soft); margin-top: 1px; }
.txn-amount { font-size: 12.5px; font-weight: 700; }
.txn-amount.plus { color: var(--forest-light); }
.txn-amount.minus { color: var(--danger); }
.txn-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.txn-act-btn {
  width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  transition: var(--transition);
}
